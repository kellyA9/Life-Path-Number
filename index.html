<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>生涯運數解析報告</title>
  <style>
    :root {
      --bg: #f8f4ee;
      --ink: #24302f;
      --text: #2d332f;
      --muted: #68736c;
      --paper: #ffffff;
      --paper-soft: #f3eee6;
      --line: rgba(45, 51, 47, .14);
      --accent: #2f7772;
      --accent-fill: #2f7772;
      --accent-soft: rgba(47, 119, 114, .12);
      --accent-ink: #1f4f4b;
      --warm: #d7a55b;
      --rose: #c86b73;
      --shadow: 0 22px 60px rgba(53, 66, 61, .13);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--text);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      line-height: 1.72;
      background: var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        linear-gradient(115deg, rgba(248, 244, 238, .94), rgba(255, 255, 255, .72) 46%, rgba(238, 229, 217, .96)),
        url("assets/life-chart-bg.png") center / cover no-repeat;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        repeating-linear-gradient(90deg, rgba(47, 119, 114, .035) 0 1px, transparent 1px 88px),
        repeating-linear-gradient(0deg, rgba(199, 143, 98, .03) 0 1px, transparent 1px 88px),
        linear-gradient(135deg, var(--accent-soft), transparent 34%),
        linear-gradient(180deg, rgba(248, 244, 238, .1), rgba(248, 244, 238, .92) 78%);
      pointer-events: none;
    }

    @keyframes gentleTurn {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    button, input { font: inherit; }

    .site-shell {
      min-height: 100vh;
    }

    .hero {
      position: relative;
      min-height: 100vh;
      display: grid;
      align-items: center;
      padding: 48px clamp(18px, 5vw, 72px);
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: min(44vw, 520px);
      aspect-ratio: 1;
      right: clamp(20px, 6vw, 100px);
      top: clamp(28px, 8vh, 96px);
      border: 1px solid rgba(47, 119, 114, .16);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,.16) 0 33%, transparent 34%),
        repeating-conic-gradient(from 18deg, rgba(47,119,114,.18) 0 2deg, transparent 2deg 16deg);
      mask-image: radial-gradient(circle, transparent 0 26%, #000 27% 100%);
      pointer-events: none;
      animation: gentleTurn 36s linear infinite;
    }

    .hero::after {
      content: "生涯運數";
      position: absolute;
      left: clamp(18px, 5vw, 74px);
      bottom: clamp(18px, 6vh, 64px);
      color: rgba(47, 119, 114, .08);
      font-size: clamp(74px, 14vw, 190px);
      font-weight: 950;
      line-height: .8;
      white-space: nowrap;
      pointer-events: none;
    }

    .hero-grid {
      position: relative;
      z-index: 1;
      width: min(1160px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(320px, 440px);
      gap: clamp(28px, 5vw, 70px);
      align-items: center;
    }

    .eyebrow {
      width: fit-content;
      margin: 0 0 18px;
      padding: 6px 12px;
      border: 1px solid rgba(47, 119, 114, .18);
      border-radius: 999px;
      color: var(--accent-ink);
      background: var(--accent-soft);
      font-size: 14px;
      font-weight: 800;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      color: var(--ink);
      font-size: clamp(42px, 8vw, 92px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .hero h1 {
      width: fit-content;
      background: linear-gradient(105deg, #1d2928 0%, var(--accent-ink) 42%, var(--warm) 72%, var(--rose) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 18px 46px rgba(39, 53, 49, .08);
    }

    .hero-copy {
      max-width: 690px;
      margin: 24px 0 0;
      color: #4b5550;
      font-size: clamp(17px, 2.1vw, 22px);
    }

    .hero-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid rgba(47, 119, 114, .14);
      border-radius: 999px;
      color: #31423e;
      background: rgba(255,255,255,.7);
      box-shadow: 0 12px 28px rgba(53, 66, 61, .08);
      font-weight: 850;
    }

    .hero-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--warm));
    }

    .entry-panel {
      position: relative;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, .94);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.88)),
        radial-gradient(circle at 95% 0%, var(--accent-soft), transparent 34%);
      box-shadow:
        0 24px 72px rgba(53, 66, 61, .15),
        0 10px 30px color-mix(in srgb, var(--accent) 12%, transparent);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .entry-panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 5px;
      background: linear-gradient(90deg, var(--accent), var(--warm), var(--rose));
    }

    .entry-panel label {
      display: block;
      margin-bottom: 10px;
      color: #3a2a1e;
      font-weight: 900;
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    input[type="date"] {
      width: 100%;
      min-height: 54px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: #fffdf7;
    }

    .primary-button {
      min-height: 52px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 900;
    }

    .primary-button {
      color: white;
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent-ink) 72%, var(--warm)));
      box-shadow: 0 12px 28px rgba(47, 119, 114, .22);
    }

    @media (prefers-reduced-motion: reduce) {
      .hero::before { animation: none; }
    }

    .hint,
    .error {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .error {
      min-height: 24px;
      color: #a3382d;
      font-weight: 800;
    }

    .report {
      display: none;
      background: linear-gradient(180deg, #ffffff, #f8f4ee);
      border-top: 1px solid rgba(45, 51, 47, .08);
    }

    .report.is-visible {
      display: block;
    }

    .report-inner {
      width: min(1120px, calc(100% - 34px));
      margin: 0 auto;
      padding: clamp(34px, 6vw, 76px) 0;
    }

    .section {
      position: relative;
      margin: 0 0 clamp(18px, 3vw, 30px);
      padding: clamp(24px, 4.5vw, 48px);
      border: 1px solid rgba(45, 51, 47, .1);
      border-radius: 8px;
      background:
        linear-gradient(115deg, rgba(255,255,255,.88) 0 34%, rgba(255,255,255,.68) 34% 36%, transparent 36% 100%),
        linear-gradient(135deg, var(--accent-soft), transparent 42%),
        rgba(255, 255, 255, .88);
      box-shadow:
        0 22px 64px rgba(53, 66, 61, .11),
        inset 0 1px 0 rgba(255,255,255,.76);
      overflow: hidden;
      isolation: isolate;
    }

    .section::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 6px;
      height: 100%;
      background: var(--accent);
      opacity: .65;
    }

    .section::after {
      content: "";
      position: absolute;
      right: -34px;
      top: -34px;
      width: 168px;
      height: 168px;
      border: 1px solid color-mix(in srgb, var(--accent) 18%, transparent);
      border-radius: 28px;
      transform: rotate(18deg);
      background:
        linear-gradient(135deg, rgba(255,255,255,.55), transparent),
        var(--accent-soft);
      opacity: .45;
      pointer-events: none;
      z-index: 0;
    }

    .section > * {
      position: relative;
      z-index: 1;
    }

    .section-head {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin-bottom: clamp(20px, 3vw, 30px);
    }

    .section-kicker {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.72), transparent),
        var(--accent-soft);
      box-shadow: 0 10px 24px color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .section-kicker::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    h2 {
      margin: 0;
      color: #251b14;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 8px;
      color: #352619;
      font-size: 20px;
      line-height: 1.28;
    }

    p { margin: 0; }

    .lead {
      max-width: 770px;
      margin-top: 14px;
      color: #5d5044;
      font-size: 17px;
    }

    .destiny-board {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: clamp(18px, 3vw, 34px);
      align-items: stretch;
    }

    .number-mark {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 320px;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--accent) 30%, white);
      border-radius: 26px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.96), rgba(255,255,255,.78)),
        radial-gradient(circle at 50% 46%, var(--accent-soft), transparent 54%),
        linear-gradient(135deg, var(--accent-soft), rgba(255,255,255,.9));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.72),
        0 26px 58px rgba(53, 66, 61, .1),
        0 18px 48px color-mix(in srgb, var(--accent) 16%, transparent);
    }

    .number-mark::before {
      content: "";
      position: absolute;
      width: 236px;
      height: 236px;
      left: 50%;
      top: 52%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,255,.96) 0 45%, transparent 46%),
        conic-gradient(from 140deg, var(--accent), rgba(255,255,255,.92), color-mix(in srgb, var(--accent) 55%, #d7a55b), var(--accent));
      box-shadow:
        inset 0 0 0 16px rgba(255,255,255,.66),
        0 18px 38px color-mix(in srgb, var(--accent) 20%, transparent);
      opacity: .9;
    }

    .number-mark::after {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px dashed color-mix(in srgb, var(--accent) 24%, transparent);
      border-radius: 20px;
      pointer-events: none;
    }

    .number-mark > div {
      position: relative;
      z-index: 1;
      display: flex;
      min-height: 250px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .number-mark span {
      display: block;
      color: color-mix(in srgb, var(--accent-ink) 78%, #251b14);
      font-size: 15px;
      font-weight: 900;
      text-align: center;
    }

    .number-mark span:first-child {
      align-self: center;
      padding: 7px 14px;
      border: 1px solid color-mix(in srgb, var(--accent) 28%, white);
      border-radius: 999px;
      background: rgba(255,255,255,.72);
      box-shadow: 0 8px 20px rgba(53, 66, 61, .08);
    }

    .number-mark span:last-child {
      margin-top: 4px;
      padding: 8px 18px;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent-ink) 80%, var(--accent)));
      box-shadow: 0 12px 26px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .number-mark strong {
      display: block;
      color: var(--ink);
      margin: 8px 0 6px;
      font-size: 154px;
      line-height: .82;
      text-align: center;
      text-shadow: 0 10px 26px rgba(37, 27, 20, .12);
    }

    .facts-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(150px, 1fr));
      gap: 12px;
    }

    .fact,
    .card,
    .reading-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.82));
      box-shadow:
        0 14px 34px rgba(53, 66, 61, .075),
        inset 0 1px 0 rgba(255,255,255,.75);
    }

    .fact {
      position: relative;
      min-height: 104px;
      padding: 16px;
      min-width: 0;
      overflow: hidden;
    }

    .fact,
    .card,
    .reading-box,
    .color-energy-card {
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
    }

    @media (hover: hover) {
      .fact:hover,
      .card:hover,
      .reading-box:hover,
      .color-energy-card:hover {
        transform: translateY(-3px);
        border-color: color-mix(in srgb, var(--accent) 28%, white);
        box-shadow:
          0 20px 46px rgba(53, 66, 61, .1),
          0 12px 26px color-mix(in srgb, var(--accent) 10%, transparent);
      }
    }

    .fact::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: .75;
    }

    .fact span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      font-weight: 900;
    }

    .fact strong {
      display: block;
      margin-top: 6px;
      color: #2c2118;
      font-size: clamp(22px, 2.4vw, 30px);
      line-height: 1.08;
      white-space: nowrap;
      word-break: normal;
      overflow-wrap: normal;
    }

    .fact.is-birth strong {
      font-size: clamp(22px, 2vw, 27px);
      letter-spacing: 0;
    }

    .trinity {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .trinity .card {
      position: relative;
      min-height: 260px;
      padding: 22px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,.96), rgba(255,255,255,.8) 46%, var(--accent-soft)),
        rgba(255,255,255,.88);
    }

    .trinity .card::before {
      content: "";
      position: absolute;
      width: 112px;
      height: 112px;
      right: -24px;
      top: -28px;
      border: 1px solid rgba(47, 119, 114, .18);
      border-radius: 50%;
    }

    .layer-label {
      color: var(--accent);
      font-weight: 900;
    }

    .layer-number {
      margin: 14px 0 12px;
      color: var(--accent);
      font-size: 76px;
      font-weight: 950;
      line-height: .9;
    }

    .card-note {
      color: #625447;
      font-size: 15px;
    }

    .two-column {
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(0, 1.1fr);
      gap: 18px;
      align-items: start;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .profile-flow {
      display: grid;
      gap: 18px;
    }

    .profile-summary {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .95fr);
      gap: 16px;
      align-items: stretch;
    }

    .profile-readings {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, .85fr);
      gap: 16px;
      align-items: start;
    }

    .profile-aside {
      display: grid;
      gap: 14px;
    }

    .profile-flow h3,
    .profile-flow .reading-title {
      color: #2d2119;
      font-size: 24px;
      line-height: 1.25;
      font-weight: 950;
    }

    .profile-flow .card,
    .profile-flow .reading-box {
      position: relative;
      overflow: hidden;
    }

    .portrait-box {
      min-height: 100%;
      background:
        linear-gradient(140deg, rgba(255,255,255,.96), rgba(255,255,255,.86) 52%, var(--accent-soft)),
        radial-gradient(circle at 96% 12%, var(--accent-soft), transparent 36%);
    }

    .portrait-box::after {
      content: "";
      position: absolute;
      right: -38px;
      bottom: -46px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 24px solid var(--accent-soft);
      pointer-events: none;
    }

    .aside-card {
      background: rgba(255,255,255,.9);
      border-left: 5px solid color-mix(in srgb, var(--accent) 72%, white);
    }

    .aside-card p,
    .aside-card .reading-list {
      font-size: 17px;
      line-height: 1.75;
    }

    .trait-card {
      min-height: 0;
      padding: 22px 24px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.96), rgba(255,255,255,.84)),
        var(--accent-soft);
    }

    .trait-card .chips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 16px;
      gap: 12px;
    }

    .trait-card .chip {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 54px;
      padding: 10px 14px;
      font-size: 19px;
      background: rgba(255,255,255,.78);
      border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
    }

    .practice-card {
      border-left: 6px solid var(--accent);
      background:
        linear-gradient(135deg, var(--accent-soft), transparent 48%),
        rgba(255,255,255,.9);
    }

    .card {
      padding: 20px;
    }

    .span-2 { grid-column: 1 / -1; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .chip {
      padding: 6px 10px;
      border-radius: 999px;
      color: #2c2118;
      background: var(--accent-soft);
      font-size: 14px;
      font-weight: 900;
    }

    .reading-box {
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.86));
    }

    .reading-box + .reading-box { margin-top: 14px; }

    .reading-title {
      margin-bottom: 8px;
      color: var(--accent);
      font-weight: 950;
    }

    .reading-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding-left: 1.2em;
      color: #34271d;
    }

    .reading-list li::marker {
      color: var(--accent);
    }

    .original {
      color: #34271d;
      font-size: 17px;
      font-weight: 760;
    }

    .note {
      color: #5d5044;
    }

    .closing {
      position: relative;
      overflow: hidden;
      padding: clamp(24px, 4vw, 34px);
      border-radius: var(--radius);
      color: var(--ink);
      background: linear-gradient(135deg, rgba(255,255,255,.96), var(--accent-soft));
      border: 1px solid var(--line);
    }

    .closing::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -60px;
      top: -70px;
      border-radius: 50%;
      background: var(--accent-soft);
      pointer-events: none;
    }

    .closing .lead {
      color: #4b5550;
    }

    .disclaimer {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
    }

    .reveal-section {
      display: block;
    }

    #destinySection {
      background:
        linear-gradient(135deg, rgba(255,255,255,.96), rgba(255,255,255,.84)),
        linear-gradient(90deg, var(--accent-soft), transparent 55%);
    }

    #trinitySection .trinity {
      position: relative;
    }

    #trinitySection .trinity::before {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      top: 52px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
      pointer-events: none;
    }

    #comboSection {
      background:
        linear-gradient(135deg, var(--accent-soft), rgba(255,255,255,.92) 34%, rgba(255,255,255,.88));
    }

    #comboSection .reading-box {
      border-left: 6px solid var(--accent);
      padding: clamp(22px, 4vw, 34px);
      font-size: 18px;
    }

    #profileSection .profile-grid .card:first-child {
      background: linear-gradient(135deg, var(--accent-soft), rgba(255,255,255,.9));
    }

    #nineColorSection {
      background:
        radial-gradient(circle at 88% 8%, rgba(255,255,255,.95) 0 22%, transparent 48%),
        linear-gradient(135deg, rgba(255,255,255,.96), var(--accent-soft));
    }

    .nine-color-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 26px;
    }

    .color-energy-card {
      position: relative;
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    function paragraph(value) {
      return escapeHtml(value).replace(/\n/g, "<br>");

    function finishSentence(value) {
      const text = String(value || "").trim();
      if (!text) return "";

    function sentenceParagraph(value) {
      return paragraph(finishSentence(value));

      const steps = [];
      let current = number;
      while (current > 9) {
        const digits = String(current).split("").map(Number);
        const next = digits.reduce((sum, digit) => sum + digit, 0);
        steps.push({ from: current, digits, to: next });
        current = next;
      }
      return { path: current, steps };
    }

        .filter((value, index, array) => index === 0 || value !== array[index - 1])
        .join("/");

        .replace(/[／]/g, "/")

      const monthNumber = Number(monthText);
      const dayNumber = Number(dayText);
      const date = new Date(yearNumber, monthNumber - 1, dayNumber);
      const isValid =
        yearNumber >= 1900 &&
        yearNumber <= 2099 &&
        date.getFullYear() === yearNumber &&
        date.getMonth() === monthNumber - 1 &&
        date.getDate() === dayNumber;

      if (!isValid) return null;

      return {
        year: String(yearNumber),
        month: String(monthNumber).padStart(2, "0"),
        day: String(dayNumber).padStart(2, "0")
      };
    }

    function formatBirthdateWhileTyping(value) {
      const input = normalizeDigits(value);
      const hasSeparator = /[\/\-.年月日\s\\]/.test(input);
      const normalized = input
        .replace(/[年月日]/g, "/")
        .replace(/[.\-\s\\]+/g, "/")
        .replace(/\/+/g, "/");

      const yearAndMonthDay = normalized.match(/^(\d{4})\/(\d{3,4})$/);
      if (yearAndMonthDay) {
        const year = yearAndMonthDay[1];
        const monthDay = yearAndMonthDay[2];
        const monthLength = monthDay.startsWith("0") || Number(monthDay.slice(0, 2)) <= 12 ? 2 : 1;
        return `${year}/${monthDay.slice(0, monthLength)}/${monthDay.slice(monthLength)}`;
      }

      if (hasSeparator) return normalized;

      const digits = input.replace(/\D/g, "").slice(0, 8);
      if (digits.length <= 4) return digits;
      if (digits.length <= 6) return `${digits.slice(0, 4)}/${digits.slice(4)}`;
      return `${digits.slice(0, 4)}/${digits.slice(4, 6)}/${digits.slice(6)}`;
    }

    function formatBirthdateFinal(value) {
      const input = normalizeDigits(value);
      const parsed = parseBirthdate(input);
      if (parsed) return `${parsed.year}/${parsed.month}/${parsed.day}`;

      const digits = input.replace(/\D/g, "").slice(0, 8);
      if (/[\/\-.年月日\s\\]/.test(input) && digits.length < 8) return input;
      if (digits.length <= 4) return digits;
      if (digits.length <= 6) return `${digits.slice(0, 4)}/${digits.slice(4)}`;
      return `${digits.slice(0, 4)}/${digits.slice(4, 6)}/${digits.slice(6)}`;
    }

    function calculate(value) {
      const parsed = parseBirthdate(value);
      if (!parsed) return null;
      const { year, month, day } = parsed;

      const birthNumber = `${year}${month}${day}`;
      const digits = birthNumber.split("").map(Number);
      const talentNumber = digits.reduce((sum, digit) => sum + digit, 0);
      const reduction = reduceSteps(talentNumber);
      const talentText = String(talentNumber);
      const bodyNumber = talentText.length === 1 ? 0 : Number(talentText[0]);
      const mindNumber = talentText.length === 1 ? talentNumber : Number(talentText[1]);

      return {
        birthNumber,
        digits,
        talentNumber,
        pathNumber: reduction.path,
        reduction,
        comboLabel: formatCombo(talentNumber, reduction),
        bodyNumber,
        mindNumber,
        spiritNumber: reduction.path
      };
    }

    function numberData(number) {
      if (number === 0) return { number: 0, title: "潛能放大" };
      return state.data.numbers.find((item) => item.number === number);
    }

    function baseData(number) {
      return state.data.base_number_traits.find((item) => item.number === number);
    }

    function comboData(result) {
      const label = normalizeComboLabel(result.comboLabel);
      if (talentComboLookup[label]) {
        return {
          talent_number: result.talentNumber,
          path_number: result.pathNumber,
          combo_label: label,
          original_description: talentComboLookup[label]
        };
      }
      return state.data.talent_combinations.find((item) =>
        item.talent_number === result.talentNumber && item.path_number === result.pathNumber
      );
    }

    function chips(items) {

    function bulletList(items) {
      return `<ul class="reading-list">${items.map((item) => `<li>${sentenceParagraph(item)}</li>`).join("")}</ul>`;
    }

    function splitPracticeItems(items, fallback) {
      const caution = [];
      let practice = "";
      for (const item of items || []) {
        const text = String(item || "").trim();
        if (text.startsWith("職場修煉：")) {
          practice = text.replace(/^職場修煉：/, "").trim();
        } else if (text) {
          caution.push(text);
        }
      }
      return { caution, practice: practice || fallback || "" };
    }

    function cleanCautionText(items) {
      const text = (items || [])
        .map((item) => String(item || "").replace(/^要特別留意[：:]\s*/, "").trim())
        .filter(Boolean)
        .join("；");
      return finishSentence(text);
    }
